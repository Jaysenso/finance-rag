logging: false

# == Preprocessing ======================

# Chunking Configuration
chunking:
  chunk_size: 1024 # Target chunk size in tokens
  chunk_overlap: 256 # Overlap between chunks
  min_chunk_size: 512 # Minimum chunk size
  max_chunk_size: 2048 # Maximum chunk size

# Document Parsing Configuration
document_parsing:
  use_vision_for_tables: false  # Enable vision model for tables
  max_vision_workers: 10  # Parallel workers for vision processing
  # Vision LLM Configuration (for image/chart descriptions during ingestion)
  vision_llm:
    provider: "openrouter"
    model: "google/gemini-2.5-flash-lite"  # Gemma with vision capabilities moonshotai/kimi-k2.5, "google/gemma-3-4b-it:free"
    max_tokens: 1024
    temperature: 0.0

# == Ingestion =========================

# Embedding Configuration
embedding:
  provider: "sentence-transformers"
  model: "all-mpnet-base-v2"
  batch_size: 32
  dimension: 768

# Vector Store Configuration
vector_store:
  provider: "qdrant"
  collection_name: "sec_filings"        
  mode: "cloud" # "cloud" or "local"
  url: "https://c0ab454e-b357-44c0-b7ac-8eb8a938d950.us-east-1-1.aws.cloud.qdrant.io" # Qdrant Cloud cluster URL (cloud mode)
  api_key: "" # Qdrant Cloud API key (cloud mode, overridden by QDRANT_API_KEY env var)
  path: "./data/qdrant" # Local file storage path (local mode)
  distance: "cosine"
  batch_size: 100

# == LLM =========================

# LLM Configuration (for query analysis, verification, reformulation)
llm:
  provider: "openrouter" # claude, openai, ollama
  model: "arcee-ai/trinity-large-preview:free"
  max_tokens: 4096
  temperature: 0.0 # Deterministic for financial data

# Vision LLM Configuration [NOT USED]
vision_llm:
  provider: "openrouter"
  model: "google/gemini-2.5-flash-lite" 
  max_tokens: 1024
  temperature: 0.0

# Generation LLM Configuration (for final answer generation, supports tool calling)
generation_llm:
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"  # "anthropic/claude-3.5-sonnet"  
  max_tokens: 8192
  temperature: 0.0


# == Retrieval =========================

# Reranker Configuration
reranker:
  provider: "cross-encoder"
  model: "cross-encoder/ms-marco-MiniLM-L-12-v2" #ms-marco-MiniLM-L-12-v2 
  top_k: 15 # Keep top K chunks after reranking

# Retrieval Configuration
retrieval:
  max_retries: 2 # Max retry attempts per sub-query on verification failure
  retrieval_limit: 30 # Number of candidates to fetch from vector store
  verification_threshold: 0.70 # Minimum verification score to accept context (0.0-1.0)
  score_threshold: 0.5 # Minimum vector similarity score for retrieval


# == HyPE =========================

# HyPE (Hypothetical Question Embeddings) - Dual-Database Retrieval
hype:
  enabled: true  # Enable HyPE dual-database retrieval (set to true after indexing questions)
  questions_per_chunk: 2  # Number of hypothetical questions to generate per chunk
  question_collection_name: "sec_filings_questions"  # Qdrant collection for questions sec_filings_questions
  content_weight: 0.5  # Weight for content DB results in RRF fusion (0.0-1.0)
  question_weight: 0.5  # Weight for question DB results in RRF fusion (0.0-1.0)
  max_tokens: 150  # Max tokens for question generation
  num_threads: 10  # Number of threads for parallel question generation

# == Evaluation =========================

# Evaluation Configuration
evaluation:
  test_set_path: "src/evaluation/data/test_set.json"
  output_path: "src/evaluation/data/results.csv"
  
  eval_llm: "arcee-ai/trinity-large-preview:free"
  test_generation_llm: "stepfun/step-3.5-flash:free"
  web_llm: "openai/gpt-4o-mini"
  llm_as_judge_llm: "arcee-ai/trinity-large-preview:free"