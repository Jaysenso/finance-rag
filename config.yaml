# Chunking Configuration
chunking:
  chunk_size: 1024 # Target chunk size in tokens
  chunk_overlap: 256 # Overlap between chunks
  min_chunk_size: 512 # Minimum chunk size
  max_chunk_size: 2048 # Maximum chunk size

# Document Parsing Configuration
document_parsing:
  use_vision: false  # Enable vision model for tables/images
  max_vision_workers: 4  # Parallel workers for vision processing

# Embedding Configuration
embedding:
  provider: "sentence-transformers"
  model: "all-mpnet-base-v2"
  batch_size: 32
  dimension: 768

# Vector Store Configuration
vector_store:
  provider: "qdrant"
  collection_name: "test_single"        #"sec_filings"        
  mode: "cloud" # "cloud" or "local"
  url: "https://c0ab454e-b357-44c0-b7ac-8eb8a938d950.us-east-1-1.aws.cloud.qdrant.io" # Qdrant Cloud cluster URL (cloud mode)
  api_key: "" # Qdrant Cloud API key (cloud mode, overridden by QDRANT_API_KEY env var)
  path: "./data/qdrant" # Local file storage path (local mode)
  distance: "cosine"
  batch_size: 100

# LLM Configuration (for query analysis, verification, reformulation)
llm:
  provider: "openrouter" # claude, openai, ollama
  model: "arcee-ai/trinity-large-preview:free"
  max_tokens: 4096
  temperature: 0.0 # Deterministic for financial data

# Vision LLM Configuration (for image/chart descriptions during ingestion)
vision_llm:
  provider: "openrouter"
  model: "google/gemini-2.5-flash-lite"  # Gemma with vision capabilities moonshotai/kimi-k2.5, "google/gemma-3-4b-it:free"
  max_tokens: 1024
  temperature: 0.0

# Generation LLM Configuration (for final answer generation, supports tool calling)
generation_llm:
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"  # Can swap to "anthropic/claude-3.5-sonnet" for tool calling
  max_tokens: 4096
  temperature: 0.0

# Reranker Configuration
reranker:
  provider: "cross-encoder"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5 # Keep top K chunks after reranking

# Retrieval Configuration
retrieval:
  max_retries: 2 # Max retry attempts per sub-query on verification failure
  retrieval_limit: 20 # Number of candidates to fetch from vector store
  verification_threshold: 0.6 # Minimum verification score to accept context (0.0-1.0)
  score_threshold: 0.3 # Minimum vector similarity score for retrieval
